  <text x="120" y="532" fill="#FDE68A" font-size="21" font-family="Courier New, monospace">tool  read_file(path=&quot;README.md&quot;)</text>

  <rect x="96" y="570" width="1088" height="128" rx="18" fill="#09111F"/>
  <text x="120" y="608" fill="#F5F5F4" font-size="21" font-family="Courier New, monospace">assistant&gt; This project is a teaching-oriented coding agent CLI.</text>
  <text x="120" y="642" fill="#CBD5E1" font-size="20" font-family="Courier New, monospace">It uses a minimal agent loop, an OpenAI-compatible backend,</text>
  <text x="120" y="676" fill="#CBD5E1" font-size="20" font-family="Courier New, monospace">workspace-safe file tools, and approval-gated shell or write actions.</text>

  <rect x="78" y="760" width="1124" height="34" rx="17" fill="#071423"/>
  <text x="108" y="783" fill="#67E8F9" font-size="18" font-family="Arial, Helvetica, sans-serif">Inspired by Claude Code • built with Typer + Rich + OpenAI tool calling</text>
