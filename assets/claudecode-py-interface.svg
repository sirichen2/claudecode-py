  <text x="108" y="220" fill="#E5E7EB" font-size="20" font-family="Courier New, monospace">$ claudecode chat --cwd ./demo-project</text>
  <text x="108" y="250" fill="#94A3B8" font-size="19" font-family="Courier New, monospace">Workspace: /path/to/demo-project   Model: gpt-4.1-mini</text>

  <rect x="78" y="288" width="1124" height="448" rx="24" fill="#040A13" stroke="#1E293B" stroke-width="2"/>
  <text x="106" y="336" fill="#93C5FD" font-size="21" font-family="Arial, Helvetica, sans-serif">Conversation</text>

  <text x="106" y="390" fill="#60A5FA" font-size="22" font-family="Courier New, monospace">you&gt; summarize this repository and inspect the project structure</text>

